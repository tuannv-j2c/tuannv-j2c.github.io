<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} — {{ site.title }}</title>
  <style>
    body { max-width: 680px; margin: 2rem auto; padding: 0 1.2rem; font-family: Georgia, serif; line-height: 1.8; color: #222; }
    a { color: #0055aa; }
    nav { margin-bottom: 2.5rem; font-family: sans-serif; font-size: 0.9rem; color: #666; }
    nav a { color: inherit; text-decoration: none; font-weight: bold; color: #0055aa; }
    img { max-width: 100%; height: auto; }
    figure { margin: 1.5rem 0; }
    figcaption { font-size: 0.85rem; color: #666; text-align: center; }
    pre { background: #f5f5f5; padding: 1rem; overflow-x: auto; }
    code { font-size: 0.9em; }
    blockquote { border-left: 3px solid #ccc; margin: 0; padding-left: 1.2rem; color: #555; }
  </style>
</head>
<body>
  <nav><a href="{{ site.baseurl }}/">{{ site.title }}</a></nav>
  {{ content }}
</body>
</html>
